// Sign canvas
let signSigCtx = null;
let signSigDrawing = false;
let signSigHasData = false;

function initSignCanvas() {
  const canvas = $('sign-sig-canvas');
  if (!canvas) return;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = 200;
  signSigCtx = canvas.getContext('2d');
  signSigCtx.strokeStyle = '#111827';
  signSigCtx.lineWidth = 2.5;
  signSigCtx.lineCap = 'round';
  signSigCtx.lineJoin = 'round';
  signSigHasData = false;

  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    signSigDrawing = true;
    signSigHasData = true;
    const pos = sigPos(e, canvas);
    signSigCtx.beginPath();
    signSigCtx.moveTo(pos.x, pos.y);
  });
  canvas.addEventListener('pointermove', (e) => {
    if (!signSigDrawing) return;
    e.preventDefault();
    const pos = sigPos(e, canvas);
    signSigCtx.lineTo(pos.x, pos.y);
    signSigCtx.stroke();
  });
  canvas.addEventListener('pointerup', () => signSigDrawing = false);
  canvas.addEventListener('pointerleave', () => signSigDrawing = false);

  $('sign-sig-clear')?.addEventListener('click', () => {
    signSigCtx.clearRect(0, 0, canvas.width, canvas.height);
    signSigHasData = false;
  });
}

function sigPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - rect.left) * scaleX, y: (src.clientY - rect.top) * scaleY };
}

function getSignSigData() {
  if (!signSigHasData) return null;
  return $('sign-sig-canvas')?.toDataURL('image/png') || null;
}

async function responseError(resp, fallback) {
  const text = await resp.text().catch(() => '');
  if (!text) return fallback || `HTTP ${resp.status}`;
  try {
    const parsed = JSON.parse(text);
    return parsed.error || parsed.message || text.slice(0, 160);
  } catch {
    return text.slice(0, 160);
  }
}

async function uploadProofAsset(consId, storageKey, kind, contentType, body) {
  const result = {
    kind,
    attemptedHaultech: true,
    haultechUploaded: false,
    fallbackSaved: false,
    error: '',
  };
  try {
    const resp = await api(`/ht/mpod/${consId}`, {
      method: 'POST',
      headers: { 'Content-Type': contentType },
      body,
    });
    if (!resp.ok) throw new Error(await responseError(resp, `${kind} upload HTTP ${resp.status}`));
    result.haultechUploaded = true;
    return result;
  } catch (e) {
    result.error = e.message || `${kind} upload failed`;
  }

  try {
    const prefix = kind === 'signature' ? 'sig' : 'pod';
    const fallbackResp = await fetch(WORKER_URL + `/photos/${prefix}-${storageKey}-${Date.now()}`, {
      method: 'PUT',
      headers: { 'X-PMG-Key': API_KEY },
      body,
    });
    if (!fallbackResp.ok) throw new Error(await responseError(fallbackResp, `${kind} fallback HTTP ${fallbackResp.status}`));
    result.fallbackSaved = true;
  } catch (fallbackError) {
    result.error = `${result.error}; fallback failed: ${fallbackError.message || fallbackError}`;
  }
  return result;
}

function summarizeProofResults(results) {
  if (!results.length) return 'No photo/signature supplied; Haultech complete only';
  return results.map(r => {
    if (r.haultechUploaded) return `${r.kind}: uploaded to Haultech`;
    if (r.fallbackSaved) return `${r.kind}: Haultech upload failed, saved to office queue (${r.error})`;
    return `${r.kind}: Haultech upload failed and fallback failed (${r.error})`;
  }).join('; ');
}

function hasUnsavedSignProof() {
  if (currentScreen !== 'sign') return false;
  // Do not interrupt the proof screen; even an empty signature/photo form may
  // be mid-capture on a driver's phone.
  return true;
}

function modalOpen(id) {
  const el = $(id);
  return !!el && !el.classList.contains('hidden');
}

function hasUnsavedModalWork() {
  if (modalOpen('add-job-modal')) return true;
  if (modalOpen('problem-modal')) return true;
  if (modalOpen('feedback-modal')) return true;
  return false;
}

function hasUnsafeUpdateReloadState() {
  return hasUnsavedSignProof() || hasUnsavedModalWork();
}

function reloadForPendingServiceWorkerUpdate() {
  if (!pendingServiceWorkerReload || hasUnsafeUpdateReloadState()) return;
  pendingServiceWorkerReload = false;
  window.location.reload();
}

// Save/submit button
async function handleSignComplete() {
  if (!activeJob) return;
  const job = activeJob;
  const consId = getJobConsignmentId(job);
  const haultechJobId = getHaultechJobId(job);
  const isDriverAdded = !haultechJobId || job._driverAdded || (job.id && String(job.id).startsWith('driver-'));
  const storageKey = consId || haultechJobId || job.id;

  setSignCompleteBusy(true);

  const consignee = $('sign-consignee')?.value?.trim() || '';
  const notes = $('sign-notes')?.value?.trim() || '';
  const weight = $('sign-weight')?.value || '0';
  const sigData = getSignSigData();
  let proofEvent = null;

  try {
    proofEvent = queueTrialEvent('proof_complete', job, {
      consigneeName: consignee,
      notes,
      weight: parseFloat(weight) || 0,
      hasSignature: !!sigData,
      hasPhoto: !!signPhotoFile,
      state: LIVE_WRITE ? 'pending Haultech' : 'saved locally',
      haultechWriteState: LIVE_WRITE ? 'pending Haultech' : 'saved locally',
    });

    if (LIVE_WRITE && !job._cached && !isDriverAdded) {
      const proofResults = [];
      if (!signPhotoFile && !sigData) {
        setQueueState(proofEvent.eventId, 'failed', 'Not completed in Haultech; no photo or signature supplied');
        toast('⚠️ Add a photo or signature, then tap Complete job');
        return;
      }

      // Save proof before completing. Haultech's MPOD endpoint is not reliable
      // for this tenant, so worker KV fallback is treated as protected proof.
      if (signPhotoFile) {
        const photoData = await signPhotoFile.arrayBuffer();
        proofResults.push(await uploadProofAsset(consId, storageKey, 'photo', signPhotoFile.type || 'image/jpeg', photoData));
      }

      if (sigData) {
        const sigBlob = await (await fetch(sigData)).arrayBuffer();
        proofResults.push(await uploadProofAsset(consId, storageKey, 'signature', 'image/png', sigBlob));
      }

      const proofSummary = summarizeProofResults(proofResults);
      const missingHaultechProof = proofResults.filter(r => !r.haultechUploaded);
      const failedFallbacks = proofResults.filter(r => !r.haultechUploaded && !r.fallbackSaved);
      if (failedFallbacks.length) {
        setQueueState(
          proofEvent.eventId,
          'failed',
          `Not completed in Haultech; proof did not upload cleanly: ${proofSummary}`
        );
        toast('⚠️ Proof upload failed — not completed');
        return;
      }

      // Complete in Haultech only after supplied proof has been protected either
      // in Haultech or in the PMG worker fallback store.
      const completeResp = await api(`/ht/complete/${haultechJobId}`, { method: 'PATCH' });
      if (!completeResp.ok) {
        throw new Error(await responseError(completeResp, 'Complete failed'));
      }
      const completionCheck = await verifyHaultechCompletion(job, haultechJobId);

      // Save POD metadata
      try {
        await fetch(WORKER_URL + `/ticket/pod-${storageKey}`, {
          method: 'PUT',
          headers: { 'X-PMG-Key': API_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            consignmentId: consId, podCode: 'success', podCodeId: POD_CODES.success,
            consigneeName: consignee, notes, weight: parseFloat(weight) || 0,
            hasSignature: !!sigData, hasPhoto: !!signPhotoFile,
            driver: currentUser.name, timestamp: new Date().toISOString(),
          }),
        });
      } catch {}

      updateJobStatusLocal(job, 'complete');
      const proofState = completionCheck.ok && !missingHaultechProof.length ? 'written' : 'saved locally';
      const proofMessage = completionCheck.ok
        ? (missingHaultechProof.length
            ? `Haultech complete verified; proof saved in PMG fallback: ${proofSummary}`
            : `Haultech complete verified; ${proofSummary}`)
        : `Haultech complete call returned OK but raw diary check did not verify received/completed: ${completionCheck.reason}. ${proofSummary}`;
      setQueueState(proofEvent.eventId, proofState, proofMessage);
      toast(completionCheck.ok ? (missingHaultechProof.length ? '✓ Completed — proof saved' : '✓ Completed — Haultech verified') : '✓ Completed — sync check pending');
    } else {
      // Trial mode, driver-added, or cached job: safe local + worker KV only.
      if (sigData) {
        try {
          const sigBlob = await (await fetch(sigData)).arrayBuffer();
          await fetch(WORKER_URL + `/photos/sig-${storageKey}-${Date.now()}`, {
            method: 'PUT', headers: { 'X-PMG-Key': API_KEY }, body: sigBlob,
          });
        } catch {}
      }
      if (signPhotoFile) {
        try {
          const photoData = await signPhotoFile.arrayBuffer();
          await fetch(WORKER_URL + `/photos/pod-${storageKey}-${Date.now()}`, {
            method: 'PUT', headers: { 'X-PMG-Key': API_KEY }, body: photoData,
          });
        } catch {}
      }
      try {
        await fetch(WORKER_URL + `/ticket/pod-${storageKey}`, {
          method: 'PUT',
          headers: { 'X-PMG-Key': API_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            jobId: storageKey, podCode: 'success', consigneeName: consignee,
            notes, weight: parseFloat(weight) || 0,
            hasSignature: !!sigData, hasPhoto: !!signPhotoFile,
            driver: currentUser.name, timestamp: new Date().toISOString(),
          }),
        });
      } catch {}

      try {
        await api(`/job-status/${storageKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'complete', driver: currentUser.name, date: todayISO() }),
        });
      } catch {}

      updateJobStatusLocal(job, 'complete');
      setQueueState(proofEvent.eventId, LIVE_WRITE ? 'pending Haultech' : 'saved locally', LIVE_WRITE ? 'Waiting for Haultech writer' : 'Proof saved locally');
      toast('✓ Complete saved');
    }

    showJobList();
    renderJobs();
    reloadForPendingServiceWorkerUpdate();
  } catch (e) {
    if (proofEvent) {
      setQueueState(proofEvent.eventId, 'failed', e.message || 'Live Haultech complete/proof failed');
    }
    toast('Error: ' + e.message);
  } finally {
    setSignCompleteBusy(false);
  }
}

async function departJob(job, btn) {
  const consId = getJobConsignmentId(job);
  const isDriverAdded = !consId || job._driverAdded || (job.id && String(job.id).startsWith('driver-'));
  const storageKey = consId || job.id || job.jobId;

  if (btn) { btn.disabled = true; btn.textContent = '…'; }

  try {
    updateJobStatusLocal(job, 'started');
    localSaveJobs(todayISO(), allJobs);
    const event = queueTrialEvent('started', job, {
      status: 'started',
      state: 'written',
      haultechWriteState: 'written',
      localOnly: true,
      haultechWrite: false,
    });
    try {
      await api(`/job-status/${storageKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'started', driver: currentUser.name, date: todayISO() }),
      });
      setQueueState(event.eventId, 'written', 'Started status saved locally and in PMG worker; no Haultech write');
    } catch (e) {
      setQueueState(event.eventId, 'failed', e.message || 'Worker status save failed; local status is still saved on this phone');
    }
    if (currentScreen === 'jobs') renderJobs();
    toast('In Transit saved');
  } catch (e) {
    toast('Error: ' + (e.message || 'Start failed'));
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Start / In Transit'; }
  }
}

let fSigCanvas, fSigCtx, fSigDrawing = false, fPhotoFile = null;

function unitForMaterial(material) {
  const pricing = MATERIAL_PRICING[material];
  if (!pricing) return '';
  if (pricing.unit === 'tonnes') return 't';
  if (pricing.unit === 'bags') return 'bags';
  if (pricing.unit === 'days') return 'days';
  if (pricing.unit === 'job') return 'items';
  return pricing.unit || '';
}

function rateForMaterial(material, qty) {
  const pricing = MATERIAL_PRICING[material];
  if (!pricing) return null;
  if (pricing.type === 'tiered') return (parseFloat(qty) || 0) >= 10 ? pricing.over10 : pricing.under10;
  return pricing.rate;
}

function initAddJobSig() {
  fSigCanvas = $('f-sig-canvas');
  fSigCtx = fSigCanvas.getContext('2d');
  fSigCtx.strokeStyle = '#f97316'; fSigCtx.lineWidth = 2; fSigCtx.lineCap = 'round';
  const getPos = e => { const r = fSigCanvas.getBoundingClientRect(); const src = e.touches?.[0] || e; return {x:(src.clientX-r.left)*(fSigCanvas.width/r.width),y:(src.clientY-r.top)*(fSigCanvas.height/r.height)}; };
  fSigCanvas.addEventListener('pointerdown', e => { fSigDrawing=true; const p=getPos(e); fSigCtx.beginPath(); fSigCtx.moveTo(p.x,p.y); e.preventDefault(); });
  fSigCanvas.addEventListener('pointermove', e => { if(!fSigDrawing) return; const p=getPos(e); fSigCtx.lineTo(p.x,p.y); fSigCtx.stroke(); e.preventDefault(); });
  fSigCanvas.addEventListener('pointerup', ()=>fSigDrawing=false);
  fSigCanvas.addEventListener('pointerleave', ()=>fSigDrawing=false);
  $('f-sig-clear').addEventListener('click', ()=>{ fSigCtx.clearRect(0,0,fSigCanvas.width,fSigCanvas.height); });
  $('f-photo').addEventListener('change', e => {
    fPhotoFile = e.target.files[0];
    if (fPhotoFile) { const r=new FileReader(); r.onload=ev=>{ const img=$('f-photo-preview'); img.src=ev.target.result; img.style.display='block'; $('f-photo-btn').textContent='📷 Change Photo'; }; r.readAsDataURL(fPhotoFile); }
  });
}

function isBlankCanvas(canvas) {
  const ctx = canvas.getContext('2d');
  const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
  return !data.some(v => v !== 0);
}

  fPriceWasAuto = false;
  maybeAutoPriceMaterial();
});
$('f-qty').addEventListener('input', maybeAutoPriceMaterial);
$('f-price').addEventListener('input', () => { fPriceWasAuto = false; });

async function loadCustomers() {
  if (customers.length) return;
  try {
    const resp = await api('/customers');
    if (resp.ok) customers = await resp.json();
  } catch {}
}

$('add-job-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const customerId = $('f-customer-id').value;
  if (LIVE_WRITE && !customerId) { toast('Select a customer from the list'); return; }

  const btn = $('add-job-submit');
  btn.disabled = true; btn.textContent = 'Saving…';

  const date = todayISO();
  const weight = parseFloat($('f-qty').value) || 0;
  const unit = $('f-unit').value || 't';
  const price = 0;
  const material = $('f-material').value.trim();
  const ref = $('f-ref').value.trim();
  const notes = $('f-notes').value.trim();
  const from = $('f-from').value.trim();
  const to = $('f-to').value.trim();
  const customerName = $('f-customer').value.trim();
  const vehicle = $('f-vehicle').value;
  if (!vehicle) {
    toast('Select truck / wagon');
    btn.disabled = false;
    btn.textContent = 'Save row for office';
    return;
  }
  setSelectedDriverVehicle(vehicle);

  const dt = new Date(date + 'T00:00:00Z');
  const epoch = Math.floor(dt.getTime() / 1000) + 43200;
  const iso = `${date}T00:00:00.0000000`;

  const driverTag = `${currentUser.name} / ${vehicle}`;
  const payload = {
    active: true, customerId, jobTypeId: JOB_TYPE_STD,
    serviceLevelId: SERVICE_LEVEL_STD, customerReference: ref,
    trafficNotes: driverTag + (notes ? ': ' + notes : ''),
    accountNotes: 'Added by ' + driverTag,
    specialInstructions: '',
    quotedPrice: price, useQuotedPrice: false, collectionRequired: false,
    deliveryDateEpoch: epoch, collectionDateEpoch: epoch,
    deliveryDate: iso, collectionDate: iso,
    weight, quantity: weight, onOrBy: 'B',
    collectionStatus: 'None', deliveryStatus: 'Scheduled',
    consignments: [{
      active: true, collection: false, delivery: true,
      goodsDescription: material, consignmentReference: ref,
      weight, quantity: weight,
      collectionAddressLine1: from || 'PM Groundworks Yard',
      collectionAddressLine3: 'Hambleton',
      collectionAddressLine4: 'Lancashire',
      collectionPostcode: from ? '' : 'FY6 9DJ',
      collectionCountry: 'United Kingdom',
      deliveryAddressLine1: to, deliveryPostcode: '',
      deliveryCountry: 'United Kingdom',
    }],
  };

  try {
    if (!LIVE_WRITE) {
      throw new Error('trial_shadow_add');
    }
    const resp = await api('/ht/upsert', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (resp.ok) {
      const jobResp = await resp.json().catch(()=>({}));
      const newJobId = jobResp.id || jobResp.jobId || ('driver-'+Date.now());
      const sigData = fSigCanvas ? fSigCanvas.toDataURL('image/png') : null;
      const hasSig = sigData && fSigCtx && !isBlankCanvas(fSigCanvas);
      if (hasSig || fPhotoFile) {
        try {
          let photoData = null;
          if (fPhotoFile) { const ab = await fPhotoFile.arrayBuffer(); photoData = btoa(String.fromCharCode(...new Uint8Array(ab))); }
          await api(`/ticket/evidence-${newJobId}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({driverName:currentUser.name,date:todayISO(),signature:hasSig?sigData:null,photo:photoData,notes:notes,type:'add_job_evidence'}) });
        } catch {}
      }
      $('add-job-modal').classList.add('hidden');
      $('add-job-form').reset();
      $('f-customer-id').value = '';
      if (fSigCtx) fSigCtx.clearRect(0,0,fSigCanvas.width,fSigCanvas.height);
      fPhotoFile = null;
      // Show confirmation modal
      showJobConfirmation({
        customer: customerName,
        vehicle,
        material,
        from: from || 'PMG Yard',
        to,
        weight, unit,
        ref: ref || newJobId,
      });
      // Immediately inject the new job into the local list so it shows straight away
      // (Haultech may take a few seconds to reflect it in the list endpoint)
      const optimisticJob = {
        id: newJobId,
        jobId: newJobId,
        driver: currentUser.name,
        vehicle,
        customer: customerName,
        goodsDescription: material,
        material,
        collectionAddressLine1: from || 'PM Groundworks Yard',
        deliveryAddressLine1: to,
        quantity: weight,
        weight,
        price: 0,
        status: 'scheduled',
        consignmentReference: ref,
        ticketNo: ref || newJobId,
        date: date,
        _driverAdded: true,
      };
      allJobs.push(optimisticJob);
      renderJobs();
      // Also reload from server after a delay to get the canonical version
      setTimeout(loadJobs, 3000);
    } else {
      const err = await resp.json().catch(() => ({}));
      toast('Failed: ' + (err.error || err.message || 'Unknown error'));
    }
  } catch (e) {
    // Save job locally so it isn't lost. In trial mode this is the intended path.
    const localDate = date;
    const localJob = {
      id: 'driver-' + Date.now(),
      driver: currentUser.name,
      vehicle,
      customer: $('f-customer').value,
      material,
      from,
      to,
      quantity: weight,
      unit,
      price: '',
      status: 'scheduled',
      savedAt: new Date().toISOString(),
      ticketNo: ref || ('local-' + Date.now()),
      _driverAdded: true,
    };
    const existingLocal = localGetJobs(localDate);
    existingLocal.push(localJob);
    localStorage.setItem('pmg_local_jobs_' + localDate, JSON.stringify(existingLocal));
    if (LIVE_WRITE) addToRetryQueue(localDate, existingLocal);
    queueTrialEvent('day_sheet_row_added', localJob, {
      customer: localJob.customer,
      vehicle: localJob.vehicle,
      material,
      from,
      to,
      quantity: weight,
      unit,
      price: '',
      reference: ref,
      notes,
      hasSignature: fSigCanvas && fSigCtx && !isBlankCanvas(fSigCanvas),
      hasPhoto: !!fPhotoFile,
      state: 'saved locally',
      haultechWriteState: 'saved locally',
      reason: LIVE_WRITE ? e.message : 'Driver-added row saved in trial mode',
    });
    allJobs.push({
      jobId: localJob.id, _cached: true, _driverAdded: true,
      _driver: localJob.driver, _customer: localJob.customer,
      _material: localJob.material, _from: localJob.from, _to: localJob.to,
      _vehicle: localJob.vehicle,
      _quantity: localJob.quantity, _price: localJob.price, _status: localJob.status,
      savedAt: localJob.savedAt,
    });
    $('add-job-modal').classList.add('hidden');
    $('add-job-form').reset();
    $('f-customer-id').value = '';
    if (fSigCtx) fSigCtx.clearRect(0,0,fSigCanvas.width,fSigCanvas.height);
    fPhotoFile = null;
    showJobConfirmation({
      customer: localJob.customer,
      vehicle: localJob.vehicle,
      material,
      from: from || 'PMG Yard',
      to,
      weight: `${weight}${unit}`,
      ref: ref || localJob.id,
    });
    renderJobs();
    toast('Row saved locally');
  } finally {
    btn.disabled = false; btn.textContent = 'Save row';
  }
});

// ══════════════════════════════════════════════════════════════════════════════
// PROBLEM / FEEDBACK TRIAL CAPTURE
// ══════════════════════════════════════════════════════════════════════════════

function showProblemModal(job) {
  activeJob = job;
  selectedProblemReason = '';
  $('problem-note').value = '';
  $('problem-photo').value = '';
  $('problem-reasons').querySelectorAll('button').forEach(btn => btn.style.borderColor = 'var(--border)');
  $('problem-modal').classList.remove('hidden');
}

$('problem-close').addEventListener('click', () => $('problem-modal').classList.add('hidden'));
$('problem-modal').addEventListener('click', e => {
  if (e.target === $('problem-modal')) $('problem-modal').classList.add('hidden');
});
$('problem-reasons').addEventListener('click', e => {
  const btn = e.target.closest('button[data-reason]');
  if (!btn) return;
  selectedProblemReason = btn.dataset.reason;
  $('problem-reasons').querySelectorAll('button').forEach(b => b.style.borderColor = 'var(--border)');
  btn.style.borderColor = 'var(--primary)';
});
$('problem-submit').addEventListener('click', async () => {
  if (!activeJob) return;
  const ok = window.confirm('Cancel this job? Only press Yes if it was not done today.');
  if (!ok) return;
  const reason = selectedProblemReason || 'Other';
  const note = $('problem-note').value.trim();
  const photo = $('problem-photo').files[0] || null;
  const event = queueTrialEvent('job_cancelled', activeJob, {
    reason,
    note,
    hasPhoto: !!photo,
    state: 'saved locally',
    haultechWriteState: 'saved locally',
  });
  if (photo) {
    try {
      const body = await photo.arrayBuffer();
      await fetch(WORKER_URL + `/photos/problem-${event.eventId}`, {
        method: 'PUT',
        headers: { 'X-PMG-Key': API_KEY },
        body,
      });
    } catch {}
  }
  updateJobStatusLocal(activeJob, 'cancelled');
  try {
    await api(`/job-status/${activeJob.id || activeJob.jobId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'cancelled', reason, note, driver: currentUser.name, date: todayISO() }),
    });
  } catch {}
  $('problem-modal').classList.add('hidden');
  toast('Job cancelled');
  showJobList();
  renderJobs();
});

function initPlaceChips() {
  document.querySelectorAll('.place-chips').forEach(wrap => {
    const target = wrap.dataset.target;
    wrap.innerHTML = COMMON_PLACES.slice(0, 4).map(place => `<button type="button" class="place-chip" data-place="${esc(place)}">${esc(place.split(',')[0])}</button>`).join('');
    wrap.querySelectorAll('.place-chip').forEach(chip => {
      chip.addEventListener('click', () => { $(target).value = chip.dataset.place; });
    });
  });
}

$('feedback-btn').addEventListener('click', () => {
  selectedFeedbackTags = [];
  $('feedback-text').value = '';
  $('feedback-tags').querySelectorAll('button').forEach(btn => btn.style.borderColor = 'var(--border)');
  $('feedback-modal').classList.remove('hidden');
});
$('feedback-close').addEventListener('click', () => $('feedback-modal').classList.add('hidden'));
$('feedback-modal').addEventListener('click', e => {
  if (e.target === $('feedback-modal')) $('feedback-modal').classList.add('hidden');
});
$('feedback-tags').addEventListener('click', e => {
  const btn = e.target.closest('button[data-tag]');
  if (!btn) return;
  const tag = btn.dataset.tag;
  if (selectedFeedbackTags.includes(tag)) {
    selectedFeedbackTags = selectedFeedbackTags.filter(t => t !== tag);
    btn.style.borderColor = 'var(--border)';
  } else {
    selectedFeedbackTags.push(tag);
    btn.style.borderColor = 'var(--primary)';
  }
});
$('feedback-submit').addEventListener('click', () => {
  const text = $('feedback-text').value.trim();
  if (!text && selectedFeedbackTags.length === 0) { toast('Add a note or tap a tag'); return; }
  queueTrialEvent(`${currentUser.username}_feedback`, { id: 'feedback', jobId: 'feedback' }, {
    tags: selectedFeedbackTags,
    text,
    state: 'written',
    haultechWriteState: 'written',
  });
  $('feedback-modal').classList.add('hidden');
  toast('Feedback saved');
});

// ══════════════════════════════════════════════════════════════════════════════
// TOOLBAR
// ══════════════════════════════════════════════════════════════════════════════

$('refresh-btn').addEventListener('click', () => { loadJobs(); toast('Refreshing…'); });

// ══════════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════════

function showJobConfirmation(job) {
  const displayWeight = (() => {
    const value = String(job.weight || '').trim();
    if (!value) return '—';
    if (/[a-z]$/i.test(value)) return value;
    return `${value}${job.unit || 't'}`;
  })();
  const details = [
    `👤 Customer: <strong>${esc(job.customer || '—')}</strong>`,
    `🚛 Truck / wagon: <strong>${esc(job.vehicle || '—')}</strong>`,
    `🚚 Material: <strong>${esc(job.material || '—')}</strong>`,
    `📍 From: <strong>${esc(job.from || '—')}</strong>`,
    `🏠 To: <strong>${esc(job.to || '—')}</strong>`,
    `⚖️ Weight: <strong>${esc(displayWeight)}</strong>`,
    `🏷️ Ref: <strong>${esc(job.ref || '—')}</strong>`,
  ].join('<br>');
  $('job-confirm-details').innerHTML = details;
  $('job-confirm-modal').classList.remove('hidden');
}

function init() {
  renderUserButtons();
  initPlaceChips();
  setHeaderForLogin();

  // Sync retry button
  $('sync-retry-btn').addEventListener('click', () => {
    const moved = markDriverFailedWritebacksSavedLocally();
    flushRetryQueue();
    updateSyncUI();
    toast(moved ? 'Saved-local queue tidied' : 'Retrying sync');
  });

  // Flush retry queue on load + every 30 seconds
  flushRetryQueue();
  setInterval(flushRetryQueue, 30000);

  // Reflect initial sync state
  updateSyncUI();

  const params = new URLSearchParams(window.location.search);
  const pathParts = window.location.pathname.toLowerCase().split('/').filter(Boolean);
  const pathDriver = pathParts.find((part) => INCAB_USERS[part]) || '';
  const requestedDriver = (params.get('driver') || pathDriver || '').toLowerCase();
  if (requestedDriver && INCAB_USERS[requestedDriver]) {
    trialMode = true;
    currentUser = { username: requestedDriver, ...INCAB_USERS[requestedDriver] };
    localStorage.setItem('pmg-user', requestedDriver);
    enterJobsScreen();
    toast(`${INCAB_USERS[requestedDriver].name} driver mode`);
    return;
  }

  const savedUser = localStorage.getItem('pmg-user');
  if (savedUser && INCAB_USERS[savedUser]) {
    showPinScreen(savedUser);
  }
}

init();

if ('serviceWorker' in navigator) {
  let refreshingForUpdate = false;
  const handleServiceWorkerUpdate = () => {
    if (refreshingForUpdate) return;
    if (hasUnsafeUpdateReloadState()) {
      pendingServiceWorkerReload = true;
      toast('Update ready - finish the open job/form first');
      return;
    }
    refreshingForUpdate = true;
    window.location.reload();
  };
  navigator.serviceWorker.addEventListener('message', (event) => {
    if (event.data?.type === 'PMG_SW_UPDATED') handleServiceWorkerUpdate();
  });
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    handleServiceWorkerUpdate();
  });
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.update().catch(() => {});
    setInterval(() => reg.update().catch(() => {}), 10 * 60 * 1000);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) reg.update().catch(() => {});
    });
  }).catch(() => {});
}
</script>
