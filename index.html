<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>PMG Driver App</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#1a2744">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a2744;
      --amber: #f59e0b;
      --green: #10b981;
      --grey: #6b7280;
      --red: #ef4444;
      --bg: #f3f4f6;
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Header ── */
    header {
      background: var(--navy);
      color: white;
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    header .subtitle {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 1px;
    }
    .header-left { display: flex; flex-direction: column; }
    .header-right { display: flex; align-items: center; gap: 12px; }

    .icon-btn {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      min-width: 44px;
      min-height: 44px;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.1); }

    /* ── Main ── */
    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 100px;
    }

    /* ── Driver select screen ── */
    #driver-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 32px;
    }
    #driver-screen h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 8px;
    }
    #driver-screen p {
      color: var(--muted);
      margin-bottom: 32px;
      font-size: 15px;
    }
    .driver-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .driver-btn {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--navy);
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.15s, background 0.15s;
      min-height: 60px;
    }
    .driver-btn:hover, .driver-btn:active {
      border-color: var(--amber);
      background: #fffbeb;
    }
    .driver-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--navy);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ── Jobs screen ── */
    #jobs-screen { display: none; }

    .date-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .date-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .refresh-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px 8px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .refresh-btn:hover { color: var(--navy); }

    /* ── Job card ── */
    .job-card {
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: box-shadow 0.15s;
    }
    .job-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
    .job-card.expanded { border-color: var(--amber); }

    .job-card-header {
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .job-card-main { flex: 1; min-width: 0; }
    .job-customer {
      font-size: 16px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .job-meta {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .job-meta .arrow { color: var(--amber); font-weight: 700; }
    .job-material {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-not-started { background: #f3f4f6; color: #6b7280; }
    .badge-in-progress { background: #fef3c7; color: #d97706; }
    .badge-complete    { background: #d1fae5; color: #065f46; }
    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Jim-only: driver tag */
    .driver-tag {
      font-size: 11px;
      font-weight: 600;
      color: var(--navy);
      background: #e0e7ff;
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* Expanded detail */
    .job-detail {
      display: none;
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
    }
    .job-card.expanded .job-detail { display: block; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
      margin-bottom: 16px;
    }
    .detail-item label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      display: block;
      margin-bottom: 2px;
    }
    .detail-item span {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }
    .detail-notes {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
      padding: 10px;
      background: var(--bg);
      border-radius: 8px;
    }

    /* Action buttons */
    .action-row {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      min-height: 48px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-start  { background: var(--amber); color: white; }
    .btn-start:hover:not(:disabled)  { background: #d97706; }
    .btn-complete { background: var(--green); color: white; }
    .btn-complete:hover:not(:disabled) { background: #059669; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 18px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
    .empty-state p { font-size: 14px; }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 14px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FAB: Add Job ── */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 50%;
      transform: translateX(50%);
      max-width: calc(600px - 32px);
      width: calc(100% - 32px);
      background: var(--navy);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(26,39,68,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 54px;
      transition: background 0.15s;
      z-index: 50;
    }
    .fab.hidden { display: none; }
    .fab:hover { background: #243561; }
    .fab:active { transform: translateX(50%) scale(0.98); }

    /* ── Modals ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: white;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px 20px 32px;
    }
    .modal-title {
      font-size: 19px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-close {
      background: var(--bg);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }

    /* ── Form ── */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: white;
      -webkit-appearance: none;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--navy);
    }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      min-height: 54px;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn-submit:hover { background: #243561; }

    /* ── Jim: all-drivers view ── */
    .driver-section { margin-bottom: 24px; }
    .driver-section-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      padding: 0 4px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>PMG Drivers</h1>
    <div class="subtitle" id="header-subtitle">Select your name</div>
  </div>
  <div class="header-right">
    <button class="icon-btn" id="gear-btn" title="Admin" style="display:none">⚙️</button>
    <button class="icon-btn" id="back-btn" title="Switch driver" style="display:none">← Back</button>
  </div>
</header>

<main>
  <!-- Driver select -->
  <div id="driver-screen">
    <h2>Who are you?</h2>
    <p>Tap your name to see your jobs</p>
    <div class="driver-list" id="driver-list"></div>
  </div>

  <!-- Jobs view -->
  <div id="jobs-screen">
    <div class="date-bar">
      <span class="date-label" id="date-label"></span>
      <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
    </div>
    <div id="jobs-container"></div>
  </div>
</main>

<!-- Add Job FAB -->
<button class="fab hidden" id="add-job-btn">＋ Add Job</button>

<!-- Add Job Modal -->
<div class="modal-overlay hidden" id="add-job-modal">
  <div class="modal">
    <div class="modal-title">
      Add Job
      <button class="modal-close" id="add-job-close">✕</button>
    </div>
    <form id="add-job-form">
      <div class="form-group">
        <label>Customer</label>
        <input type="text" id="f-customer" placeholder="Customer name" required>
      </div>
      <div class="form-group">
        <label>Material</label>
        <input type="text" id="f-material" placeholder="e.g. MOT Type 1">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Collected From</label>
          <input type="text" id="f-from" placeholder="e.g. Hanson">
        </div>
        <div class="form-group">
          <label>Delivered To</label>
          <input type="text" id="f-to" placeholder="e.g. Site name">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Quantity (t)</label>
          <input type="number" id="f-qty" placeholder="0" step="0.5" min="0">
        </div>
        <div class="form-group">
          <label>Price (£)</label>
          <input type="number" id="f-price" placeholder="0.00" step="0.01" min="0">
        </div>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Any extra info…"></textarea>
      </div>
      <button type="submit" class="btn-submit">Save Job</button>
    </form>
  </div>
</div>

<!-- Jim Password Modal -->
<div class="modal-overlay hidden" id="pw-modal">
  <div class="modal">
    <div class="modal-title">
      Admin Access
      <button class="modal-close" id="pw-close">✕</button>
    </div>
    <div style="padding-top:8px">
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="pw-input" placeholder="Enter password">
      </div>
      <button class="btn-submit" id="pw-submit">Unlock</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API_URL = 'https://pmg-driver-sync.jimpmgr.workers.dev';
const API_KEY = 'pmg2026driver';
const DRIVERS = ['John Bowman', 'Neil Antony', 'Ian Slater', 'Richard Whittaker', 'Andrew Whittaker'];
const JIM_PASSWORD = 'jimpmg2026';
const MANAGER_PASSWORD = 'PMGrichard1';

let currentDriver = null;
let isJim = false;
let allJobsData = [];
let manualJobsData = {};
let refreshTimer = null;

const $ = id => document.getElementById(id);

// ── Helpers ──────────────────────────────────────────────────────────────────

function todayISO() {
  return new Date().toISOString().split('T')[0];
}

function formatDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
}

function api(path, opts = {}) {
  return fetch(API_URL + path, {
    ...opts,
    headers: { 'X-PMG-Key': API_KEY, 'Content-Type': 'application/json', ...(opts.headers || {}) },
  });
}

function toast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase();
}

function statusBadge(status) {
  if (status === 'in_progress') return `<span class="badge badge-in-progress"><span class="badge-dot"></span>IN PROGRESS</span>`;
  if (status === 'complete')    return `<span class="badge badge-complete"><span class="badge-dot"></span>COMPLETE</span>`;
  return `<span class="badge badge-not-started"><span class="badge-dot"></span>NOT STARTED</span>`;
}

function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Driver select ─────────────────────────────────────────────────────────────

function renderDriverSelect() {
  const list = $('driver-list');
  list.innerHTML = DRIVERS.map(d => `
    <button class="driver-btn" data-driver="${esc(d)}">
      <div class="driver-avatar">${initials(d)}</div>
      <span>${esc(d)}</span>
    </button>
  `).join('');
  list.querySelectorAll('.driver-btn').forEach(btn => {
    btn.addEventListener('click', () => selectDriver(btn.dataset.driver));
  });
}

function selectDriver(name) {
  currentDriver = name;
  $('driver-screen').style.display = 'none';
  $('jobs-screen').style.display = 'block';
  $('add-job-btn').classList.remove('hidden');
  $('back-btn').style.display = 'flex';
  $('gear-btn').style.display = 'flex';
  $('header-subtitle').textContent = name;
  $('date-label').textContent = formatDate(todayISO());
  loadJobs();
  refreshTimer = setInterval(loadJobs, 5 * 60 * 1000);
}

function goBack() {
  currentDriver = null;
  isJim = false;
  allJobsData = [];
  manualJobsData = {};
  clearInterval(refreshTimer);
  refreshTimer = null;
  $('driver-screen').style.display = 'flex';
  $('jobs-screen').style.display = 'none';
  $('add-job-btn').classList.add('hidden');
  $('back-btn').style.display = 'none';
  $('gear-btn').style.display = 'none';
  $('header-subtitle').textContent = 'Select your name';
}

// ── Load jobs ─────────────────────────────────────────────────────────────────

async function loadJobs() {
  const date = todayISO();
  showLoading();
  try {
    const [htResp, manualResp] = await Promise.all([
      api(`/haultech-jobs/${date}`),
      api(`/jobs/${date}`),
    ]);
    allJobsData = htResp.ok ? await htResp.json() : [];
    manualJobsData = manualResp.ok ? await manualResp.json() : {};
  } catch (e) {
    allJobsData = [];
    manualJobsData = {};
  }
  renderJobs();
}

function showLoading() {
  $('jobs-container').innerHTML = `<div class="loading"><div class="spinner"></div>Loading jobs…</div>`;
}

// ── Render jobs ───────────────────────────────────────────────────────────────

function renderJobs() {
  const container = $('jobs-container');
  if (isJim) {
    renderJimView(container);
  } else {
    renderDriverView(container);
  }
}

function getManualJobs(driver) {
  return (manualJobsData[driver] || []).map((j, i) => ({
    ...j,
    _manual: true,
    id: j.id || ('manual-' + driver + '-' + i),
  }));
}

function renderDriverView(container) {
  const htJobs = allJobsData.filter(j =>
    (j.driver || '').toLowerCase() === currentDriver.toLowerCase()
  );
  const jobs = [...htJobs, ...getManualJobs(currentDriver)];

  if (jobs.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">🚛</div>
        <h3>No jobs today</h3>
        <p>Your jobs from Haultech will appear here.<br>Tap "Add Job" to add one manually.</p>
      </div>`;
    return;
  }

  container.innerHTML = jobs.map((job, i) => jobCardHTML(job, i, false)).join('');
  attachCardListeners(container, jobs);
}

function renderJimView(container) {
  let html = '';
  const allJobsList = [];

  for (const driver of DRIVERS) {
    const htJobs = allJobsData.filter(j =>
      (j.driver || '').toLowerCase() === driver.toLowerCase()
    );
    const jobs = [...htJobs, ...getManualJobs(driver)];
    const startIdx = allJobsList.length;
    allJobsList.push(...jobs);

    const cards = jobs.length
      ? jobs.map((job, i) => jobCardHTML(job, startIdx + i, true)).join('')
      : `<div style="padding:12px 4px;color:var(--muted);font-size:13px;">No jobs today</div>`;

    html += `<div class="driver-section"><div class="driver-section-title">${esc(driver)}</div>${cards}</div>`;
  }

  container.innerHTML = html;
  attachCardListeners(container, allJobsList);
}

function jobCardHTML(job, idx, showDriver) {
  const status = job.status || 'not_started';
  return `
    <div class="job-card" data-idx="${idx}">
      <div class="job-card-header">
        <div class="job-card-main">
          <div class="job-customer">${esc(job.customer || 'Unknown customer')}</div>
          ${showDriver && job.driver ? `<div style="margin-bottom:4px"><span class="driver-tag">${esc(job.driver)}</span></div>` : ''}
          ${job.material ? `<div class="job-material">${esc(job.material)}</div>` : ''}
          <div class="job-meta">
            <span>${esc(job.from || '—')}</span>
            <span class="arrow">→</span>
            <span>${esc(job.to || '—')}</span>
            ${job.quantity ? `<span>· ${esc(String(job.quantity))}t</span>` : ''}
            ${job.price ? `<span>· £${Number(job.price).toFixed(2)}</span>` : ''}
          </div>
        </div>
        <div>${statusBadge(status)}</div>
      </div>
      <div class="job-detail">
        <div class="detail-grid">
          <div class="detail-item"><label>From</label><span>${esc(job.from || '—')}</span></div>
          <div class="detail-item"><label>To</label><span>${esc(job.to || '—')}</span></div>
          <div class="detail-item"><label>Quantity</label><span>${job.quantity ? esc(String(job.quantity)) + 't' : '—'}</span></div>
          <div class="detail-item"><label>Price</label><span>${job.price ? '£' + Number(job.price).toFixed(2) : '—'}</span></div>
        </div>
        ${job.notes ? `<div class="detail-notes">${esc(job.notes)}</div>` : ''}
        <div class="action-row">
          <button class="btn btn-start" data-action="start" ${status !== 'not_started' ? 'disabled' : ''}>▶ Start</button>
          <button class="btn btn-complete" data-action="complete" ${status === 'complete' ? 'disabled' : ''}>✓ Complete</button>
        </div>
      </div>
    </div>`;
}

function attachCardListeners(container, jobs) {
  container.querySelectorAll('.job-card').forEach(card => {
    const idx = parseInt(card.dataset.idx);
    const job = jobs[idx];
    if (!job) return;

    card.querySelector('.job-card-header').addEventListener('click', () => {
      const isOpen = card.classList.contains('expanded');
      container.querySelectorAll('.job-card.expanded').forEach(c => c.classList.remove('expanded'));
      if (!isOpen) card.classList.add('expanded');
    });

    card.querySelector('[data-action="start"]')?.addEventListener('click', async (e) => {
      e.stopPropagation();
      await updateJobStatus(job, 'in_progress');
    });
    card.querySelector('[data-action="complete"]')?.addEventListener('click', async (e) => {
      e.stopPropagation();
      await updateJobStatus(job, 'complete');
    });
  });
}

async function updateJobStatus(job, status) {
  if (job._manual) {
    toast('Status tracking only works for Haultech jobs');
    return;
  }
  try {
    const resp = await api(`/job-status/${job.id}`, {
      method: 'POST',
      body: JSON.stringify({ status, driver: job.driver || currentDriver, date: todayISO() }),
    });
    if (resp.ok) {
      const idx = allJobsData.findIndex(j => j.id === job.id);
      if (idx !== -1) allJobsData[idx].status = status;
      renderJobs();
      toast(status === 'in_progress' ? 'Job started' : 'Job completed ✓');
    }
  } catch (e) {
    toast('Failed to update — check connection');
  }
}

// ── Add Job ───────────────────────────────────────────────────────────────────

$('add-job-btn').addEventListener('click', () => $('add-job-modal').classList.remove('hidden'));
$('add-job-close').addEventListener('click', () => $('add-job-modal').classList.add('hidden'));
$('add-job-modal').addEventListener('click', e => {
  if (e.target === $('add-job-modal')) $('add-job-modal').classList.add('hidden');
});

$('add-job-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const date = todayISO();
  const driver = currentDriver;
  const job = {
    id: 'manual-' + Date.now(),
    customer:  $('f-customer').value.trim(),
    material:  $('f-material').value.trim(),
    from:      $('f-from').value.trim(),
    to:        $('f-to').value.trim(),
    quantity:  $('f-qty').value || '',
    price:     $('f-price').value || '',
    notes:     $('f-notes').value.trim(),
    status:    'not_started',
    createdAt: new Date().toISOString(),
  };

  try {
    const updated = { ...manualJobsData };
    if (!updated[driver]) updated[driver] = [];
    updated[driver] = [...updated[driver], job];
    const resp = await api(`/jobs/${date}`, {
      method: 'PUT',
      body: JSON.stringify(updated),
    });
    if (resp.ok) {
      manualJobsData = updated;
      $('add-job-modal').classList.add('hidden');
      $('add-job-form').reset();
      renderJobs();
      toast('Job added');
    } else {
      toast('Failed to save job');
    }
  } catch (e) {
    toast('Failed to save — check connection');
  }
});

// ── Jim / Admin ───────────────────────────────────────────────────────────────

$('gear-btn').addEventListener('click', () => {
  if (isJim) {
    isJim = false;
    $('header-subtitle').textContent = currentDriver;
    renderJobs();
    toast('Back to driver view');
    return;
  }
  $('pw-modal').classList.remove('hidden');
  $('pw-input').value = '';
  setTimeout(() => $('pw-input').focus(), 100);
});

$('pw-close').addEventListener('click', () => $('pw-modal').classList.add('hidden'));
$('pw-modal').addEventListener('click', e => {
  if (e.target === $('pw-modal')) $('pw-modal').classList.add('hidden');
});

function tryJimUnlock() {
  if ($('pw-input').value === JIM_PASSWORD || $('pw-input').value === MANAGER_PASSWORD) {
    isJim = true;
    $('pw-modal').classList.add('hidden');
    $('header-subtitle').textContent = 'All Drivers (Jim view)';
    renderJobs();
    toast('Admin view unlocked');
  } else {
    toast('Wrong password');
    $('pw-input').value = '';
  }
}
$('pw-submit').addEventListener('click', tryJimUnlock);
$('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryJimUnlock(); });

// ── Back / Refresh ────────────────────────────────────────────────────────────

$('back-btn').addEventListener('click', goBack);
$('refresh-btn').addEventListener('click', () => { loadJobs(); toast('Refreshing…'); });

// ── Init ──────────────────────────────────────────────────────────────────────

renderDriverSelect();

// ── Service Worker ────────────────────────────────────────────────────────────

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
